<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0d1117;
        color: white;
      }
      h1 {
        color: #00ff88;
        font-weight: bold;
        text-align: center;
        padding: 40px 0 20px;
        letter-spacing: 2px;
      }
      .team-card {
        background: linear-gradient(135deg, #1a1f2e, #16213e);
        border: 1px solid #00ff88;
        border-radius: 12px;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        overflow: hidden;
      }
      .team-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 20px #00ff8855;
      }
      .team-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        border-radius: 50%;
        border: 2px solid #00ff88;
      }
      .btn-view {
        background-color: #00ff88;
        color: #0d1117;
        font-weight: bold;
        border: none;
      }
      .btn-view:hover {
        background-color: #00cc66;
        color: #0d1117;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🏆 All Teams</h1>
      <div class="row g-4">
        {% for team in teams %}
        <div class="col-md-4">
          <div class="team-card p-4 text-center">
            <img
              src="{{ team.logo }}"
              alt="{{ team.name }}"
              class="team-logo mb-3"
            />
            <h4 class="text-white">{{ team.name }}</h4>
            <p class="text-secondary mb-1">🌍 {{ team.country }}</p>
            <p class="text-secondary mb-3">📅 Founded: {{ team.founded }}</p>
            <a
              href="{% url 'team_detail' team.id %}"
              class="btn btn-view w-100"
            >
              View Team
            </a>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
