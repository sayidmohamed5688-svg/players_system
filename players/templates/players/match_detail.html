<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Detail</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0d1117;
        color: white;
      }
      .match-card {
        background: linear-gradient(135deg, #1a1f2e, #16213e);
        border: 1px solid #00ff88;
        border-radius: 16px;
        padding: 40px;
      }
      .team-name {
        color: white;
        font-size: 1.8rem;
        font-weight: bold;
      }
      .score {
        color: #00ff88;
        font-size: 4rem;
        font-weight: bold;
      }
      .vs {
        color: #555;
        font-size: 1.5rem;
        font-weight: bold;
      }
      .info-label {
        color: #00ff88;
        font-weight: bold;
      }
      .info-value {
        color: #ccc;
      }
      .back-btn {
        background-color: #00ff88;
        color: #0d1117;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        text-decoration: none;
      }
      .back-btn:hover {
        background-color: #00cc66;
        color: #0d1117;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="match-card">
        <h2 class="text-center mb-4" style="color: #00ff88">⚽ Match Result</h2>

        <div
          class="d-flex justify-content-center align-items-center gap-4 mb-4"
        >
          <div class="text-center">
            <p class="team-name">{{ match.home_team }}</p>
            <p class="text-secondary">Home</p>
          </div>
          <div class="text-center">
            <p class="score">{{ match.home_score }}</p>
          </div>
          <div class="text-center">
            <p class="vs">VS</p>
          </div>
          <div class="text-center">
            <p class="score">{{ match.away_score }}</p>
          </div>
          <div class="text-center">
            <p class="team-name">{{ match.away_team }}</p>
            <p class="text-secondary">Away</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
