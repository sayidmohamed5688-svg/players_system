<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matches</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0d1117;
        color: white;
      }
      h1 {
        color: #00ff88;
        font-weight: bold;
        text-align: center;
        padding: 40px 0 20px;
        letter-spacing: 2px;
      }
      .match-card {
        background: linear-gradient(135deg, #1a1f2e, #16213e);
        border: 1px solid #00ff88;
        border-radius: 12px;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .match-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 20px #00ff8855;
      }
      .team-name {
        color: white;
        font-size: 1.1rem;
        font-weight: bold;
      }
      .score {
        color: #00ff88;
        font-size: 2rem;
        font-weight: bold;
      }
      .vs {
        color: #555;
        font-weight: bold;
      }
      .btn-view {
        background-color: #00ff88;
        color: #0d1117;
        font-weight: bold;
        border: none;
      }
      .btn-view:hover {
        background-color: #00cc66;
        color: #0d1117;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚽ Match Results</h1>
      <div class="row g-4">
        {% for match in matches %}
        <div class="col-md-6">
          <div class="match-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="text-center">
                <p class="team-name">{{ match.home_team }}</p>
                <p class="text-secondary small">Home</p>
              </div>
              <div class="text-center">
                <p class="score">
                  {{ match.home_score }} - {{ match.away_score }}
                </p>
                <p class="vs">VS</p>
              </div>
              <div class="text-center">
                <p class="team-name">{{ match.away_team }}</p>
                <p class="text-secondary small">Away</p>
              </div>
            </div>
            <p class="text-secondary small">
              📅 {{ match.date }} | 🏟️ {{ match.stadium }}
            </p>
            <a
              href="{% url 'match_detail' match.id %}"
              class="btn btn-view w-100"
            >
              View Details
            </a>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
