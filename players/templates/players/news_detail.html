<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football News</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0d1117;
        color: white;
      }
      h1 {
        color: #00ff88;
        font-weight: bold;
        text-align: center;
        padding: 40px 0 20px;
        letter-spacing: 2px;
      }
      .news-card {
        background: linear-gradient(135deg, #1a1f2e, #16213e);
        border: 1px solid #00ff88;
        border-radius: 12px;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        overflow: hidden;
      }
      .news-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 20px #00ff8855;
      }
      .news-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
      }
      .news-date {
        color: #00ff88;
        font-size: 0.85rem;
      }
      .btn-read {
        background-color: #00ff88;
        color: #0d1117;
        font-weight: bold;
        border: none;
      }
      .btn-read:hover {
        background-color: #00cc66;
        color: #0d1117;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📰 Latest News</h1>
      <div class="row g-4">
        {% for article in news %}
        <div class="col-md-4">
          <div class="news-card">
            <img src="{{ article.image }}" alt="{{ article.title }}" />
            <div class="p-4">
              <h5 class="text-white">{{ article.title }}</h5>
              <p class="news-date">📅 {{ article.date }}</p>
              <p class="text-secondary">
                {{ article.content|truncatewords:20 }}
              </p>
              <a href="{% url 'news_detail' article.id %}" class="btn btn-read">
                Read More
              </a>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
