<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Players</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0d1117;
        color: white;
      }
      .player-card {
        background: linear-gradient(135deg, #1a1f2e, #16213e);
        border: 1px solid #00ff88;
        border-radius: 12px;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .player-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 20px #00ff8855;
      }
      h1 {
        color: #00ff88;
        font-weight: bold;
        text-align: center;
        padding: 40px 0 20px;
        letter-spacing: 2px;
      }
      .btn-view {
        background-color: #00ff88;
        color: #0d1117;
        font-weight: bold;
        border: none;
      }
      .btn-view:hover {
        background-color: #00cc66;
        color: #0d1117;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚽ All Players</h1>
      <div class="row g-4">
        {% for player in players %}
        <div class="col-md-4">
          <div class="player-card p-4">
            <h4 class="text-white">{{ player.name }}</h4>
            <p class="text-secondary mb-1">🏟️ {{ player.team }}</p>
            <p class="text-secondary mb-3">🎂 Age: {{ player.age }}</p>
            <a href="{% url 'player_detail' player.id %}" class="btn btn-view">
              View Profile
            </a>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
