<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Players Dashboard</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: #0b1220;
        color: #e5e7eb;
      }

      /* Header */
      .header {
        text-align: center;
        padding: 25px 15px;
        background: linear-gradient(135deg, #1e3a8a, #0f172a);
        border-bottom: 1px solid #1f2937;
      }

      .header h1 {
        font-size: 28px;
        color: #38bdf8;
      }

      .header p {
        font-size: 14px;
        color: #94a3b8;
        margin-top: 5px;
      }

      /* Container */
      .container {
        width: 95%;
        max-width: 1200px;
        margin: 30px auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }

      /* Card */
      .card {
        background: #111827;
        border-radius: 14px;
        padding: 18px;
        border: 1px solid #1f2937;
        transition: 0.3s ease;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .card:hover {
        transform: translateY(-6px);
        border-color: #38bdf8;
      }

      .name {
        font-size: 18px;
        font-weight: bold;
        color: #38bdf8;
        margin-bottom: 8px;
      }

      .team {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        background: #1e3a8a;
        color: #bfdbfe;
        font-size: 12px;
        margin-bottom: 10px;
      }

      .field {
        margin: 6px 0;
        font-size: 14px;
        color: #d1d5db;
      }

      .label {
        color: #93c5fd;
        font-weight: 600;
      }

      /* Empty state */
      .empty {
        text-align: center;
        color: #94a3b8;
        margin-top: 50px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Players Dashboard</h1>
      <p>Managed by Admin Panel</p>
    </div>

    <div class="container">
      <!-- Django LOOP START -->
      {% for player in players %}

      <div class="card">
        <div class="name">{{ player.name }}</div>
        <div class="team">{{ player.team }}</div>

        <div class="field">
          <span class="label">Phone:</span> {{ player.phone }}
        </div>
        <div class="field">
          <span class="label">Xaafadda:</span> {{ player.xaafadda }}
        </div>
        <div class="field">
          <span class="label">Age:</span> {{ player.age }}
        </div>
        <div class="field">
          <span class="label">Bio:</span> {{ player.bio }}
        </div>
      </div>

      {% empty %}
      <div class="empty">No players added yet by admin.</div>
      {% endfor %}
      <!-- Django LOOP END -->
    </div>
  </body>
</html>
