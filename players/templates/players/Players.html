<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Players Dashboard</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: radial-gradient(circle at top, #0f172a, #050816);
        color: white;
        min-height: 100vh;
      }

      /* HEADER */
      .header {
        text-align: center;
        padding: 30px 15px;
      }

      .header h1 {
        font-size: 32px;
        background: linear-gradient(90deg, #38bdf8, #60a5fa, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .header p {
        color: #94a3b8;
        margin-top: 6px;
        font-size: 14px;
      }

      /* GRID */
      .container {
        width: 95%;
        max-width: 1200px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
        padding: 20px 0 50px;
      }

      /* CARD - GLASS EFFECT */
      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        padding: 18px;
        transition: 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      /* SHINY LIGHT EFFECT */
      .card::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(56, 189, 248, 0.15),
          transparent
        );
        transform: rotate(25deg);
        transition: 0.5s;
      }

      .card:hover::before {
        left: 100%;
      }

      .card:hover {
        transform: translateY(-6px);
        border-color: #38bdf8;
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
      }

      /* NAME */
      .name {
        font-size: 18px;
        font-weight: bold;
        color: #38bdf8;
        margin-bottom: 6px;
      }

      /* TEAM BADGE */
      .team {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 20px;
        background: rgba(56, 189, 248, 0.15);
        border: 1px solid rgba(56, 189, 248, 0.3);
        color: #7dd3fc;
        font-size: 12px;
        margin-bottom: 10px;
      }

      /* FIELDS */
      .field {
        font-size: 14px;
        margin: 6px 0;
        color: #cbd5e1;
        line-height: 1.4;
      }

      .label {
        color: #60a5fa;
        font-weight: 600;
      }

      /* EMPTY */
      .empty {
        text-align: center;
        color: #94a3b8;
        margin-top: 40px;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .header h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Players Dashboard</h1>
      <p>Clean • Modern • Professional Management System</p>
    </div>

    <div class="container">
      {% for player in players %}

      <div class="card">
        <div class="name">{{ player.name }}</div>
        <div class="team">{{ player.team }}</div>

        <div class="field">
          <span class="label">Phone:</span> {{ player.phone }}
        </div>
        <div class="field">
          <span class="label">Xaafadda:</span> {{ player.xaafadda }}
        </div>
        <div class="field">
          <span class="label">Age:</span> {{ player.age }}
        </div>
        <div class="field">
          <span class="label">Bio:</span> {{ player.bio }}
        </div>
      </div>

      {% empty %}
      <div class="empty">No players available yet.</div>
      {% endfor %}
    </div>
  </body>
</html>
