<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ player.name }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0d1117;
        color: white;
      }
      .profile-card {
        background: linear-gradient(135deg, #1a1f2e, #16213e);
        border: 1px solid #00ff88;
        border-radius: 16px;
        padding: 40px;
      }
      .player-name {
        color: #00ff88;
        font-weight: bold;
        font-size: 2.5rem;
      }
      .info-label {
        color: #00ff88;
        font-weight: bold;
        min-width: 100px;
      }
      .info-value {
        color: #ccc;
      }
      .back-btn {
        background-color: #00ff88;
        color: #0d1117;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        text-decoration: none;
      }
      .back-btn:hover {
        background-color: #00cc66;
        color: #0d1117;
      }
      .badge-team {
        background-color: #00ff8822;
        border: 1px solid #00ff88;
        color: #00ff88;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="profile-card">
        <div class="mb-4">
          <h1 class="player-name">{{ player.name }}</h1>
          <span class="badge-team">🏟️ {{ player.team }}</span>
        </div>

        <hr style="border-color: #00ff8844" />

        <div class="d-flex flex-column gap-3 mt-4">
          <div class="d-flex gap-3">
            <span class="info-label">🎂 Age</span>
            <span class="info-value">{{ player.age }}</span>
          </div>
          <div class="d-flex gap-3">
            <span class="info-label">📞 Phone</span>
            <span class="info-value">{{ player.phone }}</span>
          </div>
          <div class="d-flex gap-3">
            <span class="info-label">📍 Address</span>
            <span class="info-value">{{ player.xaafadd }}</span>
          </div>
          <div class="d-flex gap-3">
            <span class="info-label">📝 Bio</span>
            <span class="info-value">{{ player.bio }}</span>
          </div>
        </div>

        <hr style="border-color: #00ff8844" />

        <a href="/" class="back-btn mt-3 d-inline-block"> ← Back to Players </a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
